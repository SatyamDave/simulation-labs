# Alembic configuration for Simulation Labs / Ghostpanel.
#
# The database URL is NOT configured here. migrations/env.py resolves it at
# runtime from ghostpanel.server.config.get_settings().effective_database_url
# and converts the async driver to its sync equivalent (see docs/migrations.md).
# Override for a one-off run with DATABASE_URL=... in the environment.

[alembic]
# Path to migration scripts (relative to this file / the invocation dir).
script_location = migrations

# Template used to generate new migration files.
# file_template = %%(rev)s_%%(slug)s

# Use os.pathsep-separated paths; prepend the repo root so "ghostpanel" imports.
prepend_sys_path = .

# Timezone for migration timestamps (blank = local time).
# timezone =

# Truncation length for the "slug" field in the file name.
truncate_slug_length = 40

# sqlalchemy.url is intentionally left blank — env.py supplies it.
sqlalchemy.url =


[post_write_hooks]
# Optional formatting hooks (disabled by default).


# Logging configuration.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
