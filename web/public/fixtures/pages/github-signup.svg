<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="800" fill="#0d1117"/>

  <!-- Octocat-ish mark, centered near top -->
  <g transform="translate(640,96)">
    <circle cx="0" cy="0" r="34" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <path d="M0,-19 C-11,-19 -20,-10 -20,1 C-20,10 -14,17 -6,20 C-5,20 -5,19 -5,18 L-5,14 C-11,15 -12,11 -12,11 C-13,9 -14,8 -14,8 C-16,7 -14,7 -14,7 C-12,7 -11,9 -11,9 C-10,11 -8,11 -6,10 C-6,9 -6,8 -5,7 C-9,7 -14,5 -14,-2 C-14,-4 -13,-6 -12,-7 C-12,-8 -13,-10 -11,-12 C-11,-12 -9,-13 -5,-10 C-3,-11 2,-11 4,-10 C8,-13 10,-12 10,-12 C12,-10 11,-8 11,-7 C12,-6 13,-4 13,-2 C13,5 8,7 4,7 C5,8 5,10 5,12 L5,18 C5,19 5,20 6,20 C14,17 20,10 20,1 C20,-10 11,-19 0,-19 Z" fill="#e6edf3"/>
  </g>

  <!-- Heading -->
  <text x="640" y="168" text-anchor="middle" font-size="26" font-weight="300" fill="#e6edf3">Sign up to GitHub</text>

  <!-- Card -->
  <rect x="440" y="208" width="400" height="426" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1" filter="url(#cardShadow)"/>

  <!-- Email field -->
  <text x="472" y="256" font-size="14" font-weight="600" fill="#e6edf3">Email</text>
  <rect x="472" y="266" width="336" height="40" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="484" y="291" font-size="14" fill="#6e7681">name@work.com</text>

  <!-- Password field -->
  <text x="472" y="340" font-size="14" font-weight="600" fill="#e6edf3">Password</text>
  <rect x="472" y="350" width="336" height="40" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="484" y="375" font-size="14" fill="#6e7681">••••••••••••</text>

  <!-- Username field -->
  <text x="472" y="424" font-size="14" font-weight="600" fill="#e6edf3">Username</text>
  <rect x="472" y="434" width="336" height="40" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="484" y="459" font-size="14" fill="#6e7681">monalisa</text>

  <!-- Helper text -->
  <text x="472" y="500" font-size="12" fill="#8b949e">Your default username is available.</text>

  <!-- Continue / Create account button -->
  <rect x="472" y="524" width="336" height="44" rx="8" fill="#238636"/>
  <text x="640" y="551" text-anchor="middle" font-size="15" font-weight="600" fill="#ffffff">Create account</text>

  <!-- Muted helper under button -->
  <text x="640" y="600" text-anchor="middle" font-size="12" fill="#8b949e">By creating an account, you agree to the Terms of Service.</text>

  <!-- "Already have an account" line -->
  <text x="640" y="676" text-anchor="middle" font-size="14" fill="#8b949e">Already have an account? <tspan fill="#2f81f7">Sign in</tspan></text>

  <!-- Footer links row -->
  <g font-size="12" fill="#2f81f7">
    <text x="470" y="744" text-anchor="middle">Terms</text>
    <text x="540" y="744" text-anchor="middle">Privacy</text>
    <text x="620" y="744" text-anchor="middle">Docs</text>
    <text x="690" y="744" text-anchor="middle">Contact GitHub</text>
    <text x="790" y="744" text-anchor="middle">Pricing</text>
  </g>
  <text x="640" y="770" text-anchor="middle" font-size="12" fill="#6e7681">© 2026 GitHub, Inc.</text>
</svg>
