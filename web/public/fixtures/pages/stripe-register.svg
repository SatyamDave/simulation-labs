<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <filter id="stripeCard" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="24" flood-color="#60627a" flood-opacity="0.22"/>
    </filter>
    <linearGradient id="leftBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6f9fc"/>
      <stop offset="1" stop-color="#eef2f8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="800" fill="#ffffff"/>
  <rect x="0" y="0" width="600" height="800" fill="url(#leftBg)"/>

  <!-- Stripe wordmark top-left -->
  <text x="72" y="72" font-size="26" font-weight="700" fill="#635bff" letter-spacing="-0.5" font-family="Helvetica, Arial, sans-serif">stripe</text>

  <!-- Left column marketing -->
  <text x="72" y="230" font-size="42" font-weight="700" fill="#0a2540" letter-spacing="-1">Start accepting</text>
  <text x="72" y="278" font-size="42" font-weight="700" fill="#0a2540" letter-spacing="-1">payments today.</text>

  <text x="72" y="326" font-size="17" fill="#425466">Create an account and start building in minutes.</text>

  <!-- Checkmark bullets -->
  <g>
    <circle cx="84" cy="392" r="13" fill="#635bff"/>
    <path d="M78,392 l4,4 l8,-9" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="110" y="398" font-size="16" fill="#0a2540">Get started quickly</text>

    <circle cx="84" cy="440" r="13" fill="#635bff"/>
    <path d="M78,440 l4,4 l8,-9" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="110" y="446" font-size="16" fill="#0a2540">Support any business model</text>

    <circle cx="84" cy="488" r="13" fill="#635bff"/>
    <path d="M78,488 l4,4 l8,-9" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="110" y="494" font-size="16" fill="#0a2540">Join millions of businesses</text>
  </g>

  <!-- Right column: white card -->
  <rect x="740" y="150" width="416" height="500" rx="14" fill="#ffffff" stroke="#eaeef3" stroke-width="1" filter="url(#stripeCard)"/>

  <text x="774" y="210" font-size="22" font-weight="700" fill="#0a2540" letter-spacing="-0.3">Create your Stripe account</text>

  <!-- Email -->
  <text x="774" y="258" font-size="13" font-weight="600" fill="#425466">Email</text>
  <rect x="774" y="268" width="348" height="42" rx="6" fill="#ffffff" stroke="#d1d9e0" stroke-width="1"/>
  <text x="786" y="294" font-size="14" fill="#8792a2">you@example.com</text>

  <!-- Full name -->
  <text x="774" y="340" font-size="13" font-weight="600" fill="#425466">Full name</text>
  <rect x="774" y="350" width="348" height="42" rx="6" fill="#ffffff" stroke="#d1d9e0" stroke-width="1"/>
  <text x="786" y="376" font-size="14" fill="#8792a2">Jane Doe</text>

  <!-- Password -->
  <text x="774" y="422" font-size="13" font-weight="600" fill="#425466">Password</text>
  <rect x="774" y="432" width="348" height="42" rx="6" fill="#ffffff" stroke="#d1d9e0" stroke-width="1"/>
  <text x="786" y="458" font-size="14" fill="#8792a2">••••••••</text>

  <!-- Create account button -->
  <rect x="774" y="500" width="348" height="46" rx="8" fill="#635bff"/>
  <text x="948" y="529" text-anchor="middle" font-size="15" font-weight="600" fill="#ffffff">Create account</text>

  <!-- Helper -->
  <text x="948" y="582" text-anchor="middle" font-size="12" fill="#8792a2">By registering, you agree to our Services Agreement.</text>
  <text x="948" y="618" text-anchor="middle" font-size="13" fill="#425466">Already have an account? <tspan fill="#635bff" font-weight="600">Sign in</tspan></text>
</svg>
