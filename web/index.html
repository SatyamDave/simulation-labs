<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulation Labs</title>
    <meta
      name="description"
      content="Simulation Labs runs a swarm of computer-use agents with mechanically degraded perception and actuation against any website, then reports the exact point where real users abandon."
    />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%22 y=%2274%22 text-anchor=%22middle%22 font-family=%22monospace%22 font-size=%2272%22 fill=%22%23737373%22>[]</text></svg>"
    />
    <script>
      // Set theme before first paint: stored preference wins, else OS setting.
      (function () {
        var stored = localStorage.getItem("theme");
        if (
          stored === "dark" ||
          (!stored && matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
