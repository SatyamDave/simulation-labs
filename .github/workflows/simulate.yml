# Behavioral gate — example workflow (see docs/ci.md)
#
# This is a TEMPLATE. `sim init` writes a ready-to-use copy into your repo.
# To gate your own flow on every PR:
#   1. Copy this file to .github/workflows/simulate.yml in your repo.
#   2. Add your model key as a secret — GEMINI_API_KEY (free tier works) or HAI_API_KEY.
#   3. Point `url` + `task` (below) at your flow, or run `sim init` for a sim.yml.
#   4. Change the trigger from `workflow_dispatch` to `pull_request` so it runs on PRs.
#
# It stays manual-only here so this repo's own PR checks don't require a key.

name: Behavioral gate (example)

on:
  workflow_dispatch:

jobs:
  behavioral-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Simulation Labs — behavioral gate
        uses: SatyamDave/simulation-labs@main # -> pin to simulationlabs/gate@v1 once released
        with:
          url: https://your-app.com/signup
          task: "create an account with email and password"
          fail-under: last-passing
          # Provide ONE model key (the CLI auto-detects whichever is set):
          gemini-api-key: ${{ secrets.GEMINI_API_KEY }}
          hai-api-key: ${{ secrets.HAI_API_KEY }}
