# sim.demo.yml — hackathon demo: a normal-looking signup where degraded
# human segments fail on a small 24px "agree to terms" checkbox while a fluent
# agent completes it. Served locally over HTTP (see docs/gtm/DEMO_RUN.md).
version: 1

flows:
  - name: signup
    url: http://localhost:8137/fixtures/demo_signup.html
    task: "Sign up for Nimbus: enter a work email and a password, tick the small 'I agree to the Terms' checkbox until it is checked, then click Create account. Done when you see 'You're in!'."
    fail_under: last-passing
    personas: [fluent, ai-agent, rushed, mobile-thumb, misclick-prone]

icp:
  personas: [fluent, ai-agent, rushed, mobile-thumb, misclick-prone]

swarm:
  rpm: 5
  max_personas: 6

output:
  dir: .demo

safety:
  allow_private: true      # localhost demo target
  allowlist: [localhost, 127.0.0.1]
